<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Post</title>

<style>
body { font-family:Arial; padding:20px; background:#f5f5f5; }
.container {
    max-width:800px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:8px;
}
h1 { margin-top:0; }
</style>
</head>

<body>

<div class="container">
    <h1 id="title"></h1>
    <p id="date"></p>
    <div id="content"></div>
</div>

<script>
// get slug from URL
const slug = window.location.pathname.split("/").pop();

fetch('data/posts.json')
.then(res=>res.json())
.then(posts=>{
    const post = posts.find(p=>p.url === slug);

    if(!post){
        window.location.href = "/404.html";
        return;
    }

    document.title = post.title;
    document.getElementById('title').innerText = post.title;
    document.getElementById('date').innerText = post.date;
    document.getElementById('content').innerText = post.description;
});
</script>

</body>
</html>
