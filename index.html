<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veda Vignanam - Veda Stotranidhi</title>
    <style>
        :root { --primary: #FF9933; --dark: #1a1a1a; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #fff5e6; }
        header { background: var(--primary); color: white; text-align: center; padding: 40px 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        header h1 { margin: 0; font-size: 32px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        header p { margin: 10px 0 0; font-size: 18px; font-weight: bold; }

        /* Search Section */
        .search-area { position: sticky; top: 0; background: white; padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 1000; }
        #searchInput { width: 85%; max-width: 700px; padding: 15px 25px; border: 2px solid var(--primary); border-radius: 30px; font-size: 18px; outline: none; }

        /* Posts Grid */
        .container { max-width: 1200px; margin: 30px auto; padding: 0 15px; }
        #postList { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        
        .card { background: white; padding: 25px; border-radius: 15px; text-decoration: none; color: var(--dark); 
                box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-bottom: 5px solid var(--primary); transition: 0.3s ease; display: flex; align-items: center; justify-content: center; text-align: center; }
        .card:hover { transform: translateY(-8px); box-shadow: 0 12px 20px rgba(0,0,0,0.15); background: #fffaf5; }
        .card h3 { margin: 0; font-size: 20px; line-height: 1.5; color: #b35900; }

        /* Footer */
        footer { background: var(--dark); color: white; text-align: center; padding: 40px 20px; margin-top: 60px; }
        .footer-logo { font-size: 22px; color: var(--primary); margin-bottom: 10px; }
    </style>
</head>
<body>

<header>
    <h1>Veda Vignanam</h1>
    <p>Veda Stotranidhi</p>
</header>

<div class="search-area">
    <input type="text" id="searchInput" placeholder="100+ స్తోత్రాలలో వెతకండి (Search Stotras...)" onkeyup="filterPosts()">
</div>

<div class="container">
    <div id="postList">
        </div>
</div>

<footer>
    <div class="footer-logo">Veda Vignanam</div>
    <p>సనాతన ధర్మ ప్రచారం - వేద విజ్ఞానం</p>
    <p>&copy; 2026 | Namo Narayanaya Bhakthi Channel</p>
</footer>

<script>
    let allPosts = [];

    // JSON డేటాను లోడ్ చేయడం
    async function loadPosts() {
        try {
            const response = await fetch('posts.json');
            allPosts = await response.json();
            displayPosts(allPosts);
        } catch (e) {
            document.getElementById('postList').innerHTML = "<p>డేటా లోడ్ అవ్వలేదు. దయచేసి posts.json ఫైల్ చెక్ చేయండి.</p>";
        }
    }

    function displayPosts(posts) {
        const list = document.getElementById('postList');
        list.innerHTML = posts.map(p => `
            <a href="${p.url}" class="card">
                <h3>${p.title}</h3>
            </a>
        `).join('');
    }

    function filterPosts() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allPosts.filter(p => p.title.toLowerCase().includes(term));
        displayPosts(filtered);
    }

    loadPosts();
</script>

</body>
</html>
