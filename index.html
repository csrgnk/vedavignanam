<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veda Vignanam - Veda Stotranidhi</title>
    <style>
        :root { --primary: #e67e22; --dark: #2c3e50; --light: #f4f4f4; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: var(--light); }
        header { background: var(--primary); color: white; text-align: center; padding: 30px 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        header h1 { margin: 0; font-size: 28px; letter-spacing: 1px; }
        header p { margin: 8px 0 0; font-size: 16px; opacity: 0.9; }

        .search-area { position: sticky; top: 0; background: white; padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 100; }
        #searchInput { width: 90%; max-width: 600px; padding: 12px 20px; border: 2px solid #ddd; border-radius: 30px; font-size: 16px; outline: none; transition: 0.3s; }
        #searchInput:focus { border-color: var(--primary); }

        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        #postList { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        
        .card { background: white; padding: 20px; border-radius: 12px; text-decoration: none; color: var(--dark); 
                box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 4px solid var(--primary); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .card h3 { margin: 0; font-size: 18px; line-height: 1.4; }

        footer { background: var(--dark); color: white; text-align: center; padding: 30px 15px; margin-top: 50px; }
        .footer-text { font-size: 14px; opacity: 0.8; }
    </style>
</head>
<body>

<header>
    <h1>Veda Vignanam</h1>
    <p>Veda Stotranidhi</p>
</header>

<div class="search-area">
    <input type="text" id="searchInput" placeholder="వెతకండి (Search Stotras...)" onkeyup="searchPosts()">
</div>

<div class="container">
    <div id="postList">
        </div>
</div>

<footer>
    <p>&copy; 2026 Veda Vignanam</p>
    <p class="footer-text">Namo Narayanaya Bhakthi Channel</p>
</footer>

<script>
    let allPosts = [];

    // JSON ఫైల్ నుండి డేటాను ఆటోమేటిక్‌గా తెచ్చుకునే ఫంక్షన్
    async function loadPosts() {
        try {
            // మీరు GitHubలో posts.json అనే ఫైల్ క్రియేట్ చేయాలి
            const response = await fetch('posts.json'); 
            allPosts = await response.json();
            displayPosts(allPosts);
        } catch (error) {
            console.error("పోస్ట్‌లను లోడ్ చేయడంలో ఇబ్బంది కలిగింది:", error);
            document.getElementById('postList').innerHTML = "<p>పోస్ట్‌లు సిద్ధంగా లేవు.</p>";
        }
    }

    function displayPosts(posts) {
        const list = document.getElementById('postList');
        list.innerHTML = posts.map(post => `
            <a href="${post.url}" class="card">
                <h3>${post.title}</h3>
            </a>
        `).join('');
    }

    function searchPosts() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allPosts.filter(p => p.title.toLowerCase().includes(term));
        displayPosts(filtered);
    }

    // పేజీ లోడ్ అవ్వగానే రన్ అవుతుంది
    loadPosts();
</script>

</body>
</html>
