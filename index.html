<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veda Vignanam - Veda Stotranidhi</title>
    <style>
        :root { --primary: #FF9933; --dark: #2c3e50; --light: #fff5e6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background-color: var(--light); color: #333; }
        
        header { background: var(--primary); color: white; text-align: center; padding: 50px 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        header h1 { margin: 0; font-size: 32px; text-transform: uppercase; }
        header p { margin: 10px 0 0; font-size: 18px; font-style: italic; opacity: 0.9; }

        .search-container { position: sticky; top: 0; background: white; padding: 20px; text-align: center; box-shadow: 0 2px 15px rgba(0,0,0,0.1); z-index: 1000; }
        #searchInput { width: 90%; max-width: 700px; padding: 15px 25px; border: 2px solid var(--primary); border-radius: 50px; font-size: 18px; outline: none; }

        .content-wrapper { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        #resultsGrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        
        .result-card { background: white; padding: 25px; border-radius: 12px; text-decoration: none; color: #b35900; 
                       box-shadow: 0 4px 8px rgba(0,0,0,0.05); border-bottom: 5px solid var(--primary); 
                       transition: 0.3s; display: block; }
        .result-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .result-card h3 { margin: 0; font-size: 19px; line-height: 1.4; }
        
        .type-badge { display: inline-block; background: #eee; color: #666; font-size: 10px; padding: 2px 8px; border-radius: 4px; margin-bottom: 10px; font-weight: bold; }
        .date-text { display: block; margin-top: 10px; font-size: 12px; color: #999; }

        footer { background: var(--dark); color: white; text-align: center; padding: 40px 20px; margin-top: 60px; }
    </style>
</head>
<body>

<header>
    <h1>Veda Vignanam</h1>
    <p>Veda Stotranidhi</p>
</header>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="Search for Stotras or Keywords..." onkeyup="filterContent()">
</div>

<div class="content-wrapper">
    <div id="resultsGrid"></div>
</div>

<footer>
    <p>&copy; 2026 | Namo Narayanaya Bhakthi Channel</p>
</footer>

<script>
    let masterData = [];

    async function initSite() {
        try {
            // Updated to look inside your 'data/' folder
            const [postsResponse, pagesResponse] = await Promise.all([
                fetch('data/posts.json'),
                fetch('data/pages.json')
            ]);

            const posts = await postsResponse.json();
            const pages = await pagesResponse.json();

            // Tagging content types
            const taggedPosts = posts.map(item => ({ ...item, contentType: 'Stotra' }));
            const taggedPages = pages.map(item => ({ ...item, contentType: 'Page' }));

            masterData = [...taggedPosts, ...taggedPages];
            displayContent(masterData);
        } catch (error) {
            console.error("Error loading JSON:", error);
            document.getElementById('resultsGrid').innerHTML = "<p>Please ensure data/posts.json and data/pages.json are uploaded.</p>";
        }
    }

    function displayContent(items) {
        const grid = document.getElementById('resultsGrid');
        grid.innerHTML = items.map(item => `
            <a href="${item.url}" class="result-card">
                <span class="type-badge">${item.contentType}</span>
                <h3>${item.title}</h3>
                <span class="date-text">${item.date || item.publish_date || ''}</span>
            </a>
        `).join('');
    }

    function filterContent() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = masterData.filter(item => {
            const titleMatch = item.title.toLowerCase().includes(query);
            const keywordMatch = (item.keyword && item.keyword.toLowerCase().includes(query)) || 
                                 (item.meta_keywords && item.meta_keywords.toLowerCase().includes(query));
            
            // Search inside description (full content) as well
            const contentMatch = (item.description && item.description.toLowerCase().includes(query)) || 
                                (item.full_page_content && item.full_page_content.toLowerCase().includes(query));
            
            return titleMatch || keywordMatch || contentMatch;
        });
        displayContent(filtered);
    }

    initSite();
</script>

</body>
</html>
