<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Veda Vignanam - Veda Stotranidhi</title>

<style>
body { margin:0; font-family:Arial; background:#f5f5f5; }

header {
    background:#6a1b9a;
    color:#fff;
    padding:15px;
    text-align:center;
}

nav {
    background:#222;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}
nav a {
    color:#fff;
    padding:12px 16px;
    text-decoration:none;
}
nav a:hover { background:#6a1b9a; }

.container { padding:20px; }

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

.card {
    background:#fff;
    border-radius:8px;
    overflow:hidden;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card img {
    width:100%;
    height:150px;
    object-fit:cover;
}

.card h3 {
    padding:10px;
    font-size:15px;
}

.pagination {
    text-align:center;
    margin:20px;
}

.pagination button {
    padding:8px 12px;
    margin:5px;
    border:none;
    background:#6a1b9a;
    color:white;
    cursor:pointer;
}

.pagination button.active { background:#222; }
</style>
</head>

<body>

<header>
    <h1>Veda Vignanam</h1>
    <p>Veda Stotranidhi</p>
</header>

<nav id="menu"></nav>

<div class="container">
    <div class="grid" id="posts"></div>
</div>

<div class="pagination" id="pagination"></div>

<script>
const postsPerPage = 25;
let currentPage = 1;
let allPosts = [];

/* LOAD MENU */
fetch('data/pages.json')
.then(res => res.json())
.then(data => {
    const menu = document.getElementById('menu');
    menu.innerHTML = `<a href="/">Home</a>`;

    data.forEach(page => {
        menu.innerHTML += `<a href="/page.html?slug=${page.url}">${page.title}</a>`;
    });
});

/* LOAD POSTS */
fetch('data/posts.json')
.then(res => res.json())
.then(data => {
    allPosts = data.sort((a,b)=> new Date(b.date)-new Date(a.date));
    renderPosts();
    renderPagination();
});

function renderPosts() {
    const start = (currentPage-1)*postsPerPage;
    const end = start + postsPerPage;
    const posts = allPosts.slice(start,end);

    const container = document.getElementById('posts');
    container.innerHTML = '';

    posts.forEach(post => {
        container.innerHTML += `
        <div class="card">
            <a href="/post.html?slug=${post.url}">
                <img src="images/default.jpg">
                <h3>${post.title}</h3>
            </a>
        </div>`;
    });
}

function renderPagination() {
    const totalPages = Math.ceil(allPosts.length/postsPerPage);
    const pagination = document.getElementById('pagination');
    pagination.innerHTML = '';

    for(let i=1;i<=totalPages;i++){
        pagination.innerHTML += `
        <button onclick="changePage(${i})" class="${i===currentPage?'active':''}">
        ${i}
        </button>`;
    }
}

function changePage(page){
    currentPage = page;
    renderPosts();
    renderPagination();
}
</script>

</body>
</html>
