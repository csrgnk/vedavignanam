<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veda Vignanam - Veda Stotranidhi</title>
    <style>
        :root { --primary: #FF9933; --dark: #2c3e50; --light: #fff5e6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: var(--light); color: #333; }
        
        /* Header Section */
        header { background: var(--primary); color: white; text-align: center; padding: 50px 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        header h1 { margin: 0; font-size: 36px; text-transform: uppercase; letter-spacing: 2px; }
        header p { margin: 10px 0 0; font-size: 20px; font-style: italic; opacity: 0.9; }

        /* Search Bar Section */
        .search-container { position: sticky; top: 0; background: white; padding: 20px; text-align: center; box-shadow: 0 2px 15px rgba(0,0,0,0.1); z-index: 1000; }
        #searchInput { width: 90%; max-width: 700px; padding: 15px 25px; border: 2px solid var(--primary); border-radius: 50px; font-size: 18px; outline: none; transition: 0.3s; }
        #searchInput:focus { box-shadow: 0 0 10px rgba(255, 153, 51, 0.5); }

        /* Results Grid */
        .content-wrapper { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        #resultsGrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        
        .result-card { background: white; padding: 25px; border-radius: 15px; text-decoration: none; color: #b35900; 
                       box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-bottom: 5px solid var(--primary); 
                       transition: transform 0.3s ease, box-shadow 0.3s ease; display: block; }
        .result-card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); background-color: #fffdfa; }
        .result-card h3 { margin: 0; font-size: 20px; line-height: 1.4; }
        
        .type-badge { display: inline-block; background: #eee; color: #666; font-size: 11px; padding: 3px 10px; border-radius: 5px; margin-bottom: 10px; text-transform: uppercase; font-weight: bold; }
        .date-text { display: block; margin-top: 10px; font-size: 13px; color: #999; }

        /* Footer */
        footer { background: var(--dark); color: white; text-align: center; padding: 40px 20px; margin-top: 60px; }
        .footer-logo { font-size: 24px; color: var(--primary); font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<header>
    <h1>Veda Vignanam</h1>
    <p>Veda Stotranidhi</p>
</header>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="Search for Stotras, Pages or Keywords..." onkeyup="filterContent()">
</div>

<div class="content-wrapper">
    <div id="resultsGrid">
        </div>
</div>

<footer>
    <div class="footer-logo">Veda Vignanam</div>
    <p>Promoting Sanatana Dharma through Vedic Knowledge</p>
    <p>&copy; 2026 | Namo Narayanaya Bhakthi Channel</p>
</footer>

<script>
    let masterData = [];

    // Load data from both JSON files simultaneously
    async function initSite() {
        try {
            const [postsResponse, pagesResponse] = await Promise.all([
                fetch('posts.json'),
                fetch('pages.json')
            ]);

            const posts = await postsResponse.json();
            const pages = await pagesResponse.json();

            // Tag each item to distinguish between Stotras and Pages
            const taggedPosts = posts.map(item => ({ ...item, contentType: 'Stotra' }));
            const taggedPages = pages.map(item => ({ ...item, contentType: 'Page' }));

            // Merge everything into one searchable array
            masterData = [...taggedPosts, ...taggedPages];
            displayContent(masterData);
        } catch (error) {
            console.error("Error loading JSON files:", error);
            document.getElementById('resultsGrid').innerHTML = "<p>Failed to load content. Please ensure posts.json and pages.json exist.</p>";
        }
    }

    function displayContent(items) {
        const grid = document.getElementById('resultsGrid');
        grid.innerHTML = items.map(item => `
            <a href="${item.url}" class="result-card">
                <span class="type-badge">${item.contentType}</span>
                <h3>${item.title}</h3>
                <span class="date-text">${item.date || item.publish_date || ''}</span>
            </a>
        `).join('');
    }

    function filterContent() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = masterData.filter(item => {
            const titleMatch = item.title.toLowerCase().includes(query);
            const keywordMatch = item.meta_keywords && item.meta_keywords.toLowerCase().includes(query);
            const descMatch = (item.meta_description && item.meta_description.toLowerCase().includes(query)) || 
                             (item.full_page_content && item.full_page_content.toLowerCase().includes(query));
            
            return titleMatch || keywordMatch || descMatch;
        });
        displayContent(filtered);
    }

    // Initialize the site
    initSite();
</script>

</body>
</html>
